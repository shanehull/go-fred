name: Test

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'

permissions:
  contents: read

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - run: go test ./...
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
