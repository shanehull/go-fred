name: Test

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'

permissions:
  contents: read

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Test
        run: |
          for i in 1 2 3; do
            go test ./... && exit 0
            echo "Attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          exit 1
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
